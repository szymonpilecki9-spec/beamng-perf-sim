name: Build Windows EXE

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install fastapi uvicorn pyinstaller pydantic pybind11 cmake

    - name: Compile C++ Core
      run: |
        cmake -S . -B build
        cmake --build build --config Release
        Get-ChildItem -Path build -Filter "beamng_perf_core.pyd" -Recurse | Copy-Item -Destination src\backend\

    - name: Build EXE with PyInstaller
      run: |
        pyinstaller --noconfirm --onefile --console --name "BeamNGPerfSim" `
          --add-data "src/frontend;frontend" `
          --add-data "src/backend/beamng_perf_core.pyd;." `
          --hidden-import beamng_perf_core `
          src/backend/server.py

    - name: Upload EXE Artifact
      uses: actions/upload-artifact@v4
      with:
        name: BeamNGPerfSim-Windows
        path: dist/BeamNGPerfSim.exe
